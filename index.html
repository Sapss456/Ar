<!DOCTYPE html>
<html lang="en">

<head>
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v7.2.0/dist/aframe-extras.min.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scan</title>
</head>

<body>
    <a-scene mindar-image="imageTargetSrc: ./targets.mind; filterMinCF: 0.001; filterBeta: 1000;" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      
      <!-- 1. DAFTARKAN FILE 3D BARU KAMU DI SINI -->
      <a-assets>
          <a-asset-item id="modelJendela" src="./Asset/Animasi/test01.glb"></a-asset-item>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
          <!-- 2. PANGGIL MODEL 3D UNTUK MENGGANTIKAN BOLA MERAH -->
          <!-- Atur position (ketinggian), scale (ukuran), dan nyalakan animation-mixer -->
          <a-gltf-model src="#modelJendela" rotation="90 0 0" position="5 0 0" scale="1 1 1" animation-mixer></a-gltf-model>
      </a-entity>

    </a-scene>
</body>

</html>
